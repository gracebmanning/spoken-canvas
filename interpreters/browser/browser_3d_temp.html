<!DOCTYPE html>
<html>

<head>
    <meta charset="UTF-8">
    <title>Browser 3D Interpreter</title>
    <!-- Three.js for 3D graphics -->
    <script type="importmap">
      {
        "imports": {
          "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
          "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
        }
      }
    </script>
    <!-- Shared color palette (defines COLOR_MAP and parseColor globally) -->
    <script src="colors.js"></script>
    <!-- Shared interpreter plumbing (executeCommand + connectInterpreter) -->
    <script src="interpreter_core.js"></script>
    <style>
        body {
            margin: 0;
            padding: 0;
            overflow: hidden;
            background: transparent;
        }

        canvas {
            display: block;
            background: transparent;
        }

        #debug {
            position: absolute;
            bottom: 10px;
            right: 10px;
            color: red;
            font-family: monospace;
            font-size: 14px;
            background: rgba(0, 0, 0, 0.7);
            padding: 10px;
            display: block;
            z-index: 1000;
        }
    </style>
</head>

<body>
    <canvas id="canvas"></canvas>
    <div id="debug">3D: Connecting...</div>

    <script type="module">
        import * as THREE from 'three';

        const debugEl = document.getElementById('debug');
        let wsConnected = false;

        // Script state tracking
        let scriptState = {
            position: 0,
            totalWords: 0,
            plainText: "",
            words: [],
            shown: false
        };

        function debug(msg) {
            console.log(`3D: ${msg}`);
            debugEl.textContent = `3D: ${msg}`;
        }

        debug('3D: Browser 3D Interpreter starting...');

        // ============================================
        // THREE.JS SETUP
        // ============================================
        const canvas = document.getElementById('canvas');

        // initialize scene
        const scene = new THREE.Scene();

        // initialize camera (Field of View, Aspect Ratio, Near clipping, Far clipping)
        const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
        camera.position.z = 5;

        // initialize renderer
        const renderer = new THREE.WebGLRenderer({
            canvas: canvas,
            alpha: true,
            antialias: true
        });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setPixelRatio(window.devicePixelRatio);

        // global lighting
        const ambientLight = new THREE.AmbientLight(0xffffff, 0.6);
        scene.add(ambientLight)

        const directionalLight = new THREE.DirectionalLight(0xffffff, 0.8); // Mimics sunlight
        directionalLight.position.set(10, 20, 10);
        scene.add(directionalLight);

        window.addEventListener('resize', () => {
            const width = window.innerWidth;
            const height = window.innerHeight;

            renderer.setSize(width, height);
            camera.aspect = width / height;
            camera.updateProjectionMatrix();
        });

        // ============================================
        // AUDIO ANALYSIS
        // ============================================
        // Lazily opens the mic on the first audio_reactive() call, then runs an RMS meter on the live signal each frame.
        // Exposes a smoothed 0..1 loudness as audiolevel for the scale dynamics.
        let audioCtx = null;
        let analyser = null;
        let timeData = null;
        let audioReady = false;
        let audioLevel = 0; // smoothed RMS loudness, 0..1, refreshed per frame

        const RMS_GAIN = 5;             // voice RMS is small; lift it toward 0..1 (tune knob)
        const AUDIO_SMOOTHING = 0.8;    // 0 = instant & jittery, ->1 = heavy lag (tune knob)

        // The scale a shape had when it became reactive, so the pulse multiplies
        // onto its own size rather than replacing it. scale() clears the entry.
        const audioBaseScale = new WeakMap();   // shape -> THREE.Vector3

        function initAudio() {
            if (audioCtx) return;       // already requested — don't prompt twice
            if (!navigator.mediaDevices || !navigator.mediaDevices.getUserMedia) {
                console.error("audio_reactive: getUserMedia unavailable — needs a secure context (https or localhost). Opening via file:// may block the mic.");
                return;
            }
            audioCtx = new (window.AudioContext || window.webkitAudioContext)();

            // A context created without a user gesture starts 'suspended', and a
            // suspended context feeds the analyser pure silence — the exact
            // "shrinks to low, never moves" symptom. Resume on the first
            // interaction; this also covers repeat loads where the mic
            // permission is remembered and no prompt (hence no gesture) occurs.
            const tryResume = (why) => {
                if (audioCtx.state === 'suspended') {
                    audioCtx.resume().then(() => console.log(`audio_reactive: context resumed (${why}) -> ${audioCtx.state}`));
                }
            };
            const resumeOnGesture = () => {
                tryResume('user gesture');
                window.removeEventListener('pointerdown', resumeOnGesture);
                window.removeEventListener('keydown', resumeOnGesture);
            };
            window.addEventListener('pointerdown', resumeOnGesture);
            window.addEventListener('keydown', resumeOnGesture);
            navigator.mediaDevices.getUserMedia({ audio: true }).then((stream) => {
                const source = audioCtx.createMediaStreamSource(stream);
                analyser = audioCtx.createAnalyser();
                analyser.fftSize = 1024;
                source.connect(analyser);
                timeData = new Uint8Array(analyser.fftSize);
                audioReady = true;
                tryResume('mic granted');
                console.log(`audio_reactive: mic ready, context '${audioCtx.state}'. If that reads 'suspended', click the page once.`);
            }).catch((err) => {
                console.error("audio_reactive: microphone unavailable —", err.message);
            });
        }

        function updateAudio() {
            if (!audioReady) return;
            analyser.getByteTimeDomainData(timeData);   // 0..255 per sample, 128 = silence
            let sumSq = 0;
            for (let i = 0; i < timeData.length; i++) {
                const v = (timeData[i] - 128) / 128;    // -1..1
                sumSq += v * v;
            }
            const rms = Math.sqrt(sumSq / timeData.length);
            const target = Math.min(1, rms * RMS_GAIN);
            // exponential moving average -> temporal smoothing (the lag/jitter knob)
            audioLevel = audioLevel * AUDIO_SMOOTHING + target * (1 - AUDIO_SMOOTHING);
            window.audioLevel = audioLevel;   // debug aid: type `audioLevel` in the console while speaking
        }

        // ============================================
        // ANIMATION ENGINE
        // ============================================
        // Accepts:
        // 1. Numeric value (tween from current value to target over 'duration' seconds)
        // 2. String expression (compiled to a function of t, seconds since page load; runs continuously)

        let t = 0; // seconds since page load

        // mesh => Map of "prop.subprop" path => function(t) => value
        // Map<THREE.Object3D, Map<string, function>>
        const dynamicProps = new Map();

        function registerDynamic(mesh, path, fn) {
            if (!dynamicProps.has(mesh)) dynamicProps.set(mesh, new Map());
            dynamicProps.get(mesh).set(path, fn)
        }

        function unregisterDynamic(mesh, path) {
            const props = dynamicProps.get(mesh)
            if (!props) return;
            props.delete(path)
            if (props.size === 0) dynamicProps.delete(mesh);
        }

        // read/write a nested property like "position.x" on an object
        function setPath(obj, path, value) {
            const parts = path.split('.');
            let target = obj;
            for (let i = 0; i < parts.length - 1; i++) target = target[parts[i]];
            target[parts[parts.length - 1]] = value;
        }
        function getPath(obj, path) {
            return path.split('.').reduce((o, k) => o[k], obj);
        }

        // compile a new expression to a function of t.
        function compileExpression(expr) {
            return new Function('t', `return ${expr};`);
        }

        function easeOutCubic(x) {
            return 1 - Math.pow(1 - x, 3);
        }

        // register a duration-based tween
        // animate 'path' from its current value to 'targetValue' over 'duration' seconds, then self-unregister.
        function registerTween(mesh, path, targetValue, duration) {
            const fromValue = getPath(mesh, path);
            const startT = t;
            const endT = startT + duration;
            registerDynamic(mesh, path, (now) => {
                if (now >= endT) {
                    unregisterDynamic(mesh, path);
                    return targetValue;
                }
                const progress = (now - startT) / duration;
                return fromValue + (targetValue - fromValue) * easeOutCubic(progress);
            });
        }

        /**
         * Dispatch x/y/z to the right slot in dynamicProps.
         *
         * @param {object}   shape          the Three.js mesh
         * @param {string}   propName       "position" or "rotation"
         * @param {*}        x,y,z          numeric, string expression, or undefined
         * @param {number}   duration       seconds; applies to numeric args only
         * @param {function} valueTransform converts user value to property unit
         *                                  (identity for position, deg->rad for rotation)
        */
        function applyTransform(shape, propName, x, y, z, duration, valueTransform = (v) => v) {
            for (const [axis, arg] of [['x', x], ['y', y], ['z', z]]) {
                const path = `${propName}.${axis}`;

                if (typeof arg === 'string') {
                    // Continuous expression. Overwrites any existing dynamic on this path.
                    const fn = compileExpression(arg);
                    registerDynamic(shape, path, (now) => valueTransform(fn(now)));
                } else if (typeof arg === 'number') {
                    // Numeric: stop any current tween/expression on this path first,
                    // otherwise it would keep writing to the property next frame.
                    unregisterDynamic(shape, path);
                    const targetValue = valueTransform(arg);
                    if (duration > 0) {
                        registerTween(shape, path, targetValue, duration);
                    } else {
                        setPath(shape, path, targetValue);
                    }
                }
            }
        }

        // per-frame: advance t, eval every registered dynamic expression, write result.
        // an error-throwing expression is logged once and unregistered.
        function tickDynamicProps(nowMs) {
            t = nowMs / 1000;
            for (const [mesh, props] of dynamicProps) {
                for (const [path, fn] of props) {
                    try {
                        setPath(mesh, path, fn(t));
                    } catch (e) {
                        console.error(`Expression error on ${path}, unregistering:`, e.message);
                        unregisterDynamic(mesh, path);
                    }
                }
            }
        }

        // ============================================
        // VERTEX NOISE (organic per-vertex drift)
        // ============================================
        // The noiseSOP equivalent: displace each vertex of a shape by a smooth,
        // time-evolving flow field sampled at its own base position. Base
        // positions are stashed once so the offset never accumulates; the field
        // is cheap (a few trig calls per vertex) and reads as gentle, organic
        // drift. Works on any shape with a position attribute (clouds, meshes).
        // Driven per frame from the render loop.

        const vertexNoise = new Map();   // shape -> { base: Float32Array, intensity }

        const NOISE_MAX_DRIFT = 0.4;    // world units of drift at intensity 1 (tune knob)
        const NOISE_TIME = 0.8;         // temporal speed of the field (tune knob)
        const NOISE_SCALE = 0.8;        // spatial frequency of the field (tune knob)

        function updateVertexNoise(t) {
            for (const [shape, info] of vertexNoise) {
                const base = info.base;
                const amp = info.intensity * NOISE_MAX_DRIFT;
                const pos = shape.geometry.attributes.position;
                const arr = pos.array;
                for (let i = 0; i < arr.length; i += 3) {
                    const bx = base[i], by = base[i + 1], bz = base[i + 2];
                    // cross-axis sin*cos -> a smooth swirling field; offset each axis from its base
                    arr[i] = bx + amp * Math.sin(by * NOISE_SCALE + t * NOISE_TIME) * Math.cos(bz * NOISE_SCALE + t * NOISE_TIME * 0.7);
                    arr[i + 1] = by + amp * Math.sin(bz * NOISE_SCALE + t * NOISE_TIME * 1.1) * Math.cos(bx * NOISE_SCALE + t * NOISE_TIME * 0.9);
                    arr[i + 2] = bz + amp * Math.sin(bx * NOISE_SCALE + t * NOISE_TIME * 0.8) * Math.cos(by * NOISE_SCALE + t * NOISE_TIME * 1.2);
                }
                pos.needsUpdate = true;
            }
        }

        // animation / render loop
        function animate(nowMs) {
            requestAnimationFrame(animate);
            if (nowMs !== undefined) {
                updateAudio(); // refresh audioLevel before dynamics read it
                tickDynamicProps(nowMs);
                updateVertexNoise(t); // drift shape vertices (t was just set by tickDynamicProps)
            }
            renderer.render(scene, camera);
        }
        requestAnimationFrame(animate);

        // ============================================
        // INTERPRETER FUNCTIONS (called by eval)
        // ============================================
        /**
         * Create a box mesh and add it to the scene.
         * @param {number} sizex    edge length on X axis. Defaults to 1.0.
         * @param {number} sizey    edge length on Y axis. Defaults to sizex.
         * @param {number} sizez    edge length on Z axis. Defaults to sizex.
         * @param {string} color    named color (ex: "red") or hex color code string. Defaults to "white".
         * @return {THREE.mesh}     the created cube mesh.
        */
        function cube(sizex = 1.0, sizey, sizez, color = "white") {
            if (typeof sizey === 'string') { color = sizey; sizey = undefined; }
            else if (typeof sizez === 'string') { color = sizez; sizez = undefined; }

            if (sizey === undefined) sizey = sizex;
            if (sizez === undefined) sizez = sizex;

            const geometry = new THREE.BoxGeometry(sizex, sizey, sizez);
            const material = new THREE.MeshPhongMaterial({ color: parseColor(color) });
            const mesh = new THREE.Mesh(geometry, material);
            scene.add(mesh);
            return mesh;
        }

        /**
         * Create a sphere or ellipsoid.
         *
         * A string in any size slot is the color, and unfilled sizes default to radx for the uniform case.
         *
         * @param {number} radx   radius on X. Default 0.5.
         * @param {number} rady   radius on Y. Defaults to radx.
         * @param {number} radz   radius on Z. Defaults to radx.
         * @param {string} color  named color or hex. Default "white".
         *
        */
        function sphere(radx = 0.5, rady, radz, color = "white") {
            if (typeof rady === 'string') { color = rady; rady = undefined; }
            else if (typeof radz === 'string') { color = radz; radz = undefined; }

            if (rady === undefined) rady = radx;
            if (radz === undefined) radz = radx;

            const geometry = new THREE.SphereGeometry(1, 32, 32);
            geometry.scale(radx, rady, radz);   // bake ellipsoid into vertices
            const material = new THREE.MeshPhongMaterial({ color: parseColor(color) });
            const mesh = new THREE.Mesh(geometry, material);
            scene.add(mesh);
            return mesh;
        }

        /**
         * Create a torus (donut shape).
         * String shorthand: torus(0.6, "orange") -> outer 0.6, default tube, orange.
         *
         * @param {number} radx   outer ring radius (center of torus to center of tube). Default 0.5.
         * @param {number} rady   tube radius (thickness of the ring). Default 0.25.
         * @param {string} color  named color or hex. Default "white".
         *
         */
        function torus(radx = 0.5, rady = 0.25, color = "white") {
            if (typeof rady === 'string') { color = rady; rady = 0.25; }

            // TorusGeometry(outerRadius, tubeRadius, radialSegments, tubularSegments)
            // 16/32 segments is a good smoothness/cost balance for typical sizes.
            const geometry = new THREE.TorusGeometry(radx, rady, 16, 32);
            const material = new THREE.MeshPhongMaterial({ color: parseColor(color) });
            const mesh = new THREE.Mesh(geometry, material);
            scene.add(mesh);
            return mesh;
        }

        /**
         * Create a tube: cylinder, cone, or truncated cone (frustum).
         * 
         * @param {number} rad1     top radius. Default 0.5.
         * @param {number} rad2     bottom radius. Defaults to rad1.
         * @param {number} height   height. Default 0.5.
         * @param {string} color    named color or hex value. Default "white".
        */
        function tube(rad1 = 0.5, rad2, height = 0.5, color = "white") {
            if (typeof rad2 === 'string') { color = rad2; rad2 = undefined }
            else if (typeof height === 'string') { color = height; height = undefined }

            if (rad2 === undefined) rad2 = rad1; // cylinder by default
            if (height === undefined) height = 0.5;

            const geometry = new THREE.CylinderGeometry(rad1, rad2, height, 32);
            const material = new THREE.MeshPhongMaterial({ color: parseColor(color) })
            const mesh = new THREE.Mesh(geometry, material)
            scene.add(mesh)
            return mesh;
        }

        // Cached white circular sprite for rendering spherical cloud points.
        let _circleTexture = null;
        function getCircleTexture() {
            if (_circleTexture) return _circleTexture;

            const size = 64;
            const canvas = document.createElement('canvas');
            canvas.width = canvas.height = size;
            const ctx = canvas.getContext('2d');
            ctx.beginPath();
            ctx.arc(size / 2, size / 2, size / 2 * 0.9, 0, Math.PI * 2);
            ctx.fillStyle = 'white';   // white so material.color tints it
            ctx.fill();
            _circleTexture = new THREE.CanvasTexture(canvas);
            return _circleTexture;
        }

        /**
         * Create a point cloud. Points are scattered with a Gaussian distribution (dense
         * core, soft edges) and drawn via THREE.Points.
         *
         * @param {number} quantity   0..1, fraction of MAX_POINTS used. 1.0 = 100 points, 0.5 = 50.
         * @param {number} spread    standard deviation of the scatter — larger is a wider, looser cloud.
         *                           1.0 is a good visible default; 0.5 tighter, 2.0 wider.
         * @param {string} color     named color or hex. Default "white".
         * @param {string} shape     point shape: "circle" (default, round dot) or "square".
         *
         * Returns a THREE.Points object.
         *
         */
        function cloud(quantity = 1.0, spread = 1.0, color, shape) {
            // Box-Muller transform: a normally-distributed random number (mean 0, std dev 1).
            // Used to scatter points with a dense core and wispy edges.
            function gaussianRandom() {
                let u = 0, v = 0;
                while (u === 0) u = Math.random();  // avoid log(0)
                while (v === 0) v = Math.random();
                return Math.sqrt(-2 * Math.log(u)) * Math.cos(2 * Math.PI * v);
            }

            // classify the trailing args
            const SHAPE_WORDS = ['circle', 'square'];
            let resolvedSpread = 1.0, resolvedColor = 'white', resolvedShape = 'circle';
            for (const arg of [spread, color, shape]) {
                if (typeof arg === 'number') {
                    resolvedSpread = arg;
                } else if (typeof arg === 'string') {
                    const lower = arg.toLowerCase();
                    if (SHAPE_WORDS.includes(lower)) resolvedShape = lower;
                    else resolvedColor = arg;
                }
            }

            const MAX_POINTS = 100;
            quantity = Math.max(0, Math.min(1, quantity));
            const count = Math.max(4, Math.round(MAX_POINTS * quantity));

            // Three coordinates per point, scattered by a Gaussian * spread.
            const positions = new Float32Array(count * 3);
            for (let i = 0; i < count; i++) {
                positions[i * 3] = gaussianRandom() * resolvedSpread;
                positions[i * 3 + 1] = gaussianRandom() * resolvedSpread;
                positions[i * 3 + 2] = gaussianRandom() * resolvedSpread;
            }

            const geometry = new THREE.BufferGeometry();
            geometry.setAttribute('position', new THREE.BufferAttribute(positions, 3));

            const material = new THREE.PointsMaterial({
                color: parseColor(resolvedColor),
                size: 0.1,               // world-unit point size; first thing to tune if too small/large
                sizeAttenuation: true,   // points shrink with distance (depth cue)
            });

            if (resolvedShape != 'square') {
                material.map = getCircleTexture();
                material.alphaTest = 0.5; // discard corner fragments -> disc, with correct depth sorting
                material.transparent = true;
            }

            const points = new THREE.Points(geometry, material);
            scene.add(points);
            return points;
        }

        /**
         * Move a shape. Each axis arg can be:
         * 1) a number => snap (duration = 0) or tween (duration > 0)
         * 2) a string => compiled to a per-frame expression, ex: "t * 0.5"
         * 
         * Mixed args are allowed.
         * Ex: move(b, "t * 0.5", 0, 0, 2) updates X axis via expression while Y and Z tween to 0 over 2 seconds.
         * 
         * @param {THREE.Object3D} shape
         * @param {number|string}  x         target X position
         * @param {number|string}  y         target Y position
         * @param {number|string}  z         target Z position
         * @param {number}         duration  seconds; applies to numeric args only. 0 (default) = instant.
        */
        function move(shape, x = 0.0, y = 0.0, z = 0.0, duration = 0) {
            if (!shape) return;
            applyTransform(shape, 'position', x, y, z, duration);
        }

        /**
         * Rotate a shape. Angles are in degrees, converted to radians internally for Three.js.
         * Conversion is applied to expression results, too, so "t * 60" means 60 deg/sec.
         * 
         * @param {THREE.Object3D} shape
         * @param {number|string}  rx        degrees around X (or expression string)
         * @param {number|string}  ry        degrees around Y (or expression string)
         * @param {number|string}  rz        degrees around Z (or expression string)
         * @param {number}         duration  seconds; applies to numeric args only. 0 (default) = instant.
         * Examples:
         *   rotate(b1, 0, 90, 0)            snap to 90 deg around Y
         *   rotate(b1, 0, 90, 0, 1)         tween to 90 over 1 second
         *   rotate(b1, 0, "t * 60", 0)      spin at 60 deg/sec around Y, forever
        */
        function rotate(shape, rx = 0.0, ry = 0.0, rz = 0.0, duration = 0) {
            if (!shape) return;
            const degToRad = (deg) => deg * Math.PI / 180;
            applyTransform(shape, 'rotation', rx, ry, rz, duration, degToRad);
        }

        /**
         * Scale a shape.
         * 
         * Shorthand: if sy or sz is undefined, it defaults to sx. So
         *   scale(b1, 2)            -> uniform 2.0 on all three axes
         *   scale(b1, "1 + 0.2 * Math.sin(t * 2)")  -> uniform pulse via expression
         * To scale only one axis, pass 1 for the others explicitly:
         *   scale(b1, 2, 1, 1)      -> stretch X only, leave Y/Z at 1.0
         * 
         * Note: calling scale(b1) with no other args resets to (1, 1, 1).
         * 
         * @param {THREE.Object3D} shape
         * @param {number|string}  sx        scale factor on X
         * @param {number|string}  sy        scale factor on Y (defaults to sx)
         * @param {number|string}  sz        scale factor on Z (defaults to sx)
         * @param {number}         duration  seconds; applies to numeric args only. 0 (default) = instant.
        */
        function scale(shape, sx = 1.0, sy, sz, duration = 0) {
            if (!shape) return;
            if (sy === undefined) sy = sx;
            if (sz === undefined) sz = sx;

            // take over scale control and drop audioreactivity
            audioBaseScale.delete(shape);

            applyTransform(shape, 'scale', sx, sy, sz, duration);
        }

        function audio_reactive(shapes, low = 0.8, high = 1.0) {
            const list = Array.isArray(shapes) ? shapes : [shapes]; // normalize to array
            initAudio();

            for (const shape of list) {
                if (!shape) continue;

                // Capture the pulse base.
                // If the shape is already audio reactive, reuse the stored base so re-calling (ex: to change low/high)
                // doesn't compound onto a mid-pulse value.
                let base = audioBaseScale.get(shape);
                if (!base) {
                    base = shape.scale.clone();
                    audioBaseScale.set(shape, base);
                }

                // One audio factor drives all three axes (uniform pulse).
                for (const axis of ['x', 'y', 'z']) {
                    const b = base[axis];
                    registerDynamic(shape, `scale.${axis}`, () => b * (low + (high - low) * audioLevel))
                }
            }
        }

        /**
         * Recolor a shape.
         * 
         * @param {THREE.Object3D}  shape
         * @param {string}          color       named color or hex value.
         * @param {number}          duration    seconds; 0 (default) = instant.
        */
        function color(shape, color, duration = 0) {
            if (!shape || !shape.material) return;
            const resolved = parseColor(color);

            // stop any existing tweens
            unregisterDynamic(shape, 'material.color.r');
            unregisterDynamic(shape, 'material.color.g');
            unregisterDynamic(shape, 'material.color.b');

            if (duration > 0 && shape.material.color) {
                const target = new THREE.Color(resolved);
                registerTween(shape, 'material.color.r', target.r, duration);
                registerTween(shape, 'material.color.g', target.g, duration);
                registerTween(shape, 'material.color.b', target.b, duration);
            } else {
                const mats = Array.isArray(shape.material) ? shape.material : [shape.material];
                for (const m of mats) {
                    if (m.color) m.color.set(resolved);
                }
            }
        }

        /**
         * Set a shape's opacity (0 = invisible, 1 = opaque).
         * 
         * @param {THREE.Object3D}  shape
         * @param {number|string}   value       0->1. Default 1.0.
         * @param {number}          duration    seconds; numeric value only. 0 (default) = instant.
        */
        function opacity(shape, value = 1.0, duration = 0) {
            if (!shape || !shape.material) return;
            const mats = Array.isArray(shape.material) ? shape.material : [shape.material];
            const path = 'material.opacity';

            const setTransparent = (m, on) => {
                if (m.transparent !== on) {
                    m.transparent = on;
                    m.needsUpdate = true;
                }
            }

            if (typeof value === 'string') {
                // expression -> per-frame opacity, e.g. "0.5 + 0.5 * Math.sin(t)".
                // it can dip below 1 at any time, so blending must stay on.
                for (const m of mats) setTransparent(m, true);
                registerDynamic(shape, path, compileExpression(value));
                return;
            }

            // numeric: stop any running fade/expression first so it can't keep writing the property next frame.
            unregisterDynamic(shape, path);
            if (duration > 0) {
                for (const m of mats) setTransparent(m, true);   // dips below 1 mid-fade
                registerTween(shape, path, value, duration);
            } else {
                for (const m of mats) {
                    m.opacity = value;
                    setTransparent(m, value < 1);   // only blend when not fully opaque
                }
            }
        }

        /**
         * Remove the specified shape from the scene.
         * 
         * @param {THREE.Object3D} shape
        */
        function remove(shape) {
            if (!shape) return;

            dynamicProps.delete(shape); // remove any active tweens/expressions
            vertexNoise.delete(shape);   // stop any vertex drift

            scene.remove(shape); // remove from scene

            // dispose of geometry and materials
            if (shape.geometry) shape.geometry.dispose();
            if (shape.material) {
                // a mesh may carry an array of materials; handle both cases.
                if (Array.isArray(shape.material)) {
                    for (const m of shape.material) m.dispose();
                } else {
                    shape.material.dispose();
                }
            }
        }

        /**
         * Remove all shapes from the scene. Lights and camera are preserved.
        */
        function clear() {
            dynamicProps.clear(); // stop every tween/expression
            vertexNoise.clear();   // stop every vertex drift

            const toRemove = scene.children.filter(
                child => child.isMesh || child.isPoints
            )

            for (const child of toRemove) {
                scene.remove(child);
                if (child.geometry) child.geometry.dispose();
                if (child.material) {
                    // a mesh may carry an array of materials; handle both cases.
                    if (Array.isArray(child.material)) {
                        for (const m of child.material) m.dispose();
                    } else {
                        child.material.dispose();
                    }
                }
            }
        }

        /**
         * Give a shape organic movement by drifting each of its vertices with a
         * smooth, time-evolving noise field (the noiseSOP equivalent). Works on
         * any shape with a position attribute — point clouds scatter, meshes
         * ripple and wobble.
         *
         *   noise(shape)         default intensity 0.5
         *   noise(shape, 0.2)    subtle
         *   noise(shape, 1.0)    lively
         *   noise(shape, 0)      stop and snap back to the original positions
         *
         * Note for meshes: the drift amount is absolute (world units), so a
         * small mesh wants a lower intensity than a spread-out cloud; and vertex
         * normals aren't recomputed, so a lit mesh under strong drift shades as
         * if undeformed. Both are fine for subtle motion.
         *
         * @param {THREE.Object3D} shape
         * @param {number} intensity  0..1 drift amount. Default 0.5.
         */
        function noise(shape, intensity = 0.5) {
            if (!shape || !shape.geometry || !shape.geometry.attributes.position) return;
            intensity = Math.max(0, Math.min(1, intensity));

            if (intensity === 0) {
                // Stop: restore the stashed base positions, then drop the entry.
                const info = vertexNoise.get(shape);
                if (info) {
                    shape.geometry.attributes.position.array.set(info.base);
                    shape.geometry.attributes.position.needsUpdate = true;
                    vertexNoise.delete(shape);
                }
                return;
            }

            // Stash the original positions once and reuse them on re-calls, so
            // changing intensity never captures an already-drifted frame as base.
            let info = vertexNoise.get(shape);
            if (!info) {
                info = { base: shape.geometry.attributes.position.array.slice(), intensity };
                vertexNoise.set(shape, info);
            } else {
                info.intensity = intensity;
            }
        }

        // ============================================
        // MAKE FUNCTIONS GLOBALLY ACCESSIBLE
        // ============================================
        // Exposed on window so eval'd commands (which run in global scope) can call them.
        // THREE is exposed so a command can reach for raw Three.js when a helper doesn't cover what it needs.
        window.THREE = THREE;
        window.scene = scene;
        window.camera = camera;
        window.renderer = renderer;
        window.cube = cube;
        window.sphere = sphere;
        window.torus = torus;
        window.tube = tube;
        window.cloud = cloud;
        window.move = move;
        window.rotate = rotate;
        window.scale = scale;
        window.audio_reactive = audio_reactive;
        window.color = color;
        window.opacity = opacity;
        window.remove = remove;
        window.clear = clear;
        window.noise = noise;

        // ============================================
        // WEBSOCKET CONNECTION
        // ============================================

        connectInterpreter({
            target: 'browser_3d',
            onStatus: (msg) => debug(msg),
            onExecute: (code) => {
                debug('Executing: ' + code);
                console.log('>>> EVAL:', code);
                executeCommand(code, {
                    onError: (e) => debug('Error: ' + e.message),
                });
            },
            onPosition: (data) => {
                scriptState.position = data.position;
                if (data.totalWords) scriptState.totalWords = data.totalWords;
                if (data.words) scriptState.words = data.words;
                if (data.plainText) scriptState.plainText = data.plainText;

                const progress = scriptState.totalWords > 0 ?
                    (scriptState.position / scriptState.totalWords * 100).toFixed(0) : 0;
                debug(`Position: ${scriptState.position}/${scriptState.totalWords} (${progress}%)`);
            },
        });

        console.log(`Three.js initialized, view size: ${window.innerWidth}x${window.innerHeight}`);
        debug('Ready');
    </script>
</body>

</html>
