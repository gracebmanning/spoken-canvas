<!DOCTYPE html>
<html>

<head>
    <meta charset="UTF-8">
    <title>Browser 2D Interpreter</title>
    <!-- Paper.js for vector graphics -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/paper.js/0.12.17/paper-full.min.js"></script>
    <!-- Shared interpreter plumbing (connectToEditor's applyOps listener) -->
    <script src="interpreter_core.js"></script>
    <style>
        body {
            margin: 0;
            padding: 0;
            overflow: hidden;
            background: transparent;
        }

        canvas {
            display: block;
            background: transparent;
        }
    </style>
</head>

<body>
    <canvas id="canvas"></canvas>

    <script>
        const debugEl = document.getElementById('debug');

        // ============================================
        // PAPER.JS SETUP
        // ============================================

        // Setup Paper.js
        const canvas = document.getElementById('canvas');
        canvas.width = 1920;
        canvas.height = 1080;
        paper.setup(canvas);

        // Keep each item's transformation matrix instead of baking it into the
        // geometry, so rotation / scaling read back as live, animatable absolute
        // properties (with the default applyMatrix=true they'd read 0 / (1,1)).
        paper.settings.applyMatrix = false;

        // Convenient aliases
        const { view, Path, Point } = paper;

        // ============================================
        // GENERIC {id, kind, props} APPLY-DISPATCHER
        // ============================================
        // The editor (listener/listen2/editor.html) now owns the verb functions,
        // the FRP engine, and a plain state store per world. Once per frame it
        // posts the full current state of every live object for this world; this
        // file's only job is to turn {id, kind, props} into native Paper.js
        // objects and keep them in sync. It never evals script text.
        //
        // nativeCache: id -> { kind, item }
        const nativeCache = new Map();

        // Kind-specific geometry construction. Only the shape itself; generic
        // Item properties (position/rotation/scaling/opacity/fillColor/
        // strokeColor) are applied uniformly afterward in applyCommonProps.
        function constructNative(kind, props) {
            switch (kind) {
                case 'circle':
                    return new Path.Circle({
                        center: [props.position.x, props.position.y],
                        radius: props.radius,
                    });
                case 'square':
                case 'rect':
                    return new Path.Rectangle({
                        center: [props.position.x, props.position.y],
                        size: [props.size.width, props.size.height],
                    });
                case 'ellipse':
                    return new Path.Ellipse({
                        center: [props.position.x, props.position.y],
                        size: [props.size.width, props.size.height],
                    });
                case 'box':
                    return new Path.Rectangle({
                        center: [props.position.x, props.position.y],
                        size: [props.size.width, props.size.height],
                    });
                case 'line':
                    return new Path.Line({
                        from: [props.from.x, props.from.y],
                        to: [props.to.x, props.to.y],
                    });
                case 'arrow': {
                    const group = new paper.Group();
                    for (const seg of props.lines) {
                        group.addChild(new Path.Line({
                            from: [seg.from.x, seg.from.y],
                            to: [seg.to.x, seg.to.y],
                        }));
                    }
                    return group;
                }
                case 'text':
                    return new paper.PointText({
                        point: [props.position.x, props.position.y],
                        justification: 'center',
                        fontFamily: 'Arial, sans-serif',
                    });
                default:
                    console.error('applyOps: unknown 2D kind:', kind);
                    return null;
            }
        }

        // Apply the current props to an existing native item. Kind-specific
        // settable fields first, then the generic Item properties every kind
        // shares (position/rotation/scaling/opacity/fillColor/strokeColor).
        function applyProps(kind, item, props) {
            // Paper.js's `position` setter always centers the item's bounding
            // box on the given point, which silently overrides `justification`
            // for horizontal alignment. So instead of relying on justification,
            // we compute a compensating x-offset here and let the generic
            // `position` assignment below do the actual placement.
            let textAlignOffsetX = 0;
            if (kind === 'text') {
                item.content = String(props.content);
                item.fontSize = props.fontSize;
                const align = props.align || 'center';
                if (align === 'left') textAlignOffsetX = item.bounds.width / 2;
                else if (align === 'right') textAlignOffsetX = -item.bounds.width / 2;
            }
            if (kind === 'line' || kind === 'arrow' || kind === 'box') {
                item.strokeWidth = props.strokeWidth;
            }
            // Unlike a circle's radius, a Path's segment points ARE freely
            // rewritable after construction — so endpoint coordinates can be
            // reactive too, just by re-applying them every tick (the editor's
            // reconciler already recomputes props.from/to/lines fresh on every
            // reconciled call; this is the piece that was missing to make that
            // visible).
            if (kind === 'line' && props.from && props.to) {
                item.firstSegment.point = new Point(props.from.x, props.from.y);
                item.lastSegment.point = new Point(props.to.x, props.to.y);
            }
            if (kind === 'arrow' && props.lines) {
                props.lines.forEach((seg, i) => {
                    const child = item.children[i];
                    if (!child) return;
                    child.firstSegment.point = new Point(seg.from.x, seg.from.y);
                    child.lastSegment.point = new Point(seg.to.x, seg.to.y);
                });
            }

            if (props.position) item.position = new Point(props.position.x + textAlignOffsetX, props.position.y);
            if (props.scaling) item.scaling = new Point(props.scaling.x, props.scaling.y);
            if (typeof props.rotation === 'number') item.rotation = props.rotation;
            if (typeof props.opacity === 'number') item.opacity = props.opacity;
            // fillColor/strokeColor are resolved to hex once in the editor (colors.js
            // lives there now); we just assign the string. `null` is a valid value
            // (box's fill), so check for undefined rather than falsiness.
            if (props.fillColor !== undefined) item.fillColor = props.fillColor;
            if (props.strokeColor !== undefined) item.strokeColor = props.strokeColor;
        }

        function applyOp({ id, kind, props }) {
            let cache = nativeCache.get(id);
            if (cache && cache.kind !== kind) {
                // Not expected in Phase 1 (nothing recreates ids yet) — handle
                // defensively by destroying and reconstructing.
                cache.item.remove();
                nativeCache.delete(id);
                cache = null;
            }
            if (!cache) {
                const item = constructNative(kind, props);
                if (!item) return;
                cache = { kind, item };
                nativeCache.set(id, cache);
            }
            applyProps(kind, cache.item, props);
        }

        function destroyNative(id) {
            const cache = nativeCache.get(id);
            if (!cache) return;
            cache.item.remove();
            nativeCache.delete(id);
        }

        // ============================================
        // CONNECT TO EDITOR
        // ============================================
        connectToEditor({
            onApplyOps: ({ t, ops, removed }) => {
                for (const id of removed) destroyNative(id);
                for (const op of ops) applyOp(op);
                view.draw();
            },
        });

        console.log('Paper.js initialized, view size:', view.size);
    </script>
</body>

</html>
