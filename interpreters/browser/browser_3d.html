<!DOCTYPE html>
<html>

<head>
    <meta charset="UTF-8">
    <title>Browser 3D Interpreter</title>
    <!-- Three.js for 3D graphics -->
    <script type="importmap">
      {
        "imports": {
          "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
          "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
        }
      }
    </script>
    <!-- Shared interpreter plumbing (connectToEditor's applyOps listener) -->
    <script src="interpreter_core.js"></script>
    <style>
        body {
            margin: 0;
            padding: 0;
            overflow: hidden;
            background: transparent;
        }

        canvas {
            display: block;
            background: transparent;
        }

        #debug {
            position: absolute;
            bottom: 10px;
            right: 10px;
            color: red;
            font-family: monospace;
            font-size: 14px;
            background: rgba(0, 0, 0, 0.7);
            padding: 10px;
            display: block;
            z-index: 1000;
        }
    </style>
</head>

<body>
    <canvas id="canvas"></canvas>
    <div id="debug">3D: Connecting...</div>

    <script type="module">
        import * as THREE from 'three';

        const debugEl = document.getElementById('debug');

        function debug(msg) {
            console.log(`3D: ${msg}`);
            debugEl.textContent = `3D: ${msg}`;
        }

        debug('3D: Browser 3D Interpreter starting...');

        // ============================================
        // THREE.JS SETUP
        // ============================================
        const canvas = document.getElementById('canvas');

        // initialize scene
        const scene = new THREE.Scene();

        // initialize camera (Field of View, Aspect Ratio, Near clipping, Far clipping)
        const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
        camera.position.z = 5;

        // initialize renderer
        const renderer = new THREE.WebGLRenderer({
            canvas: canvas,
            alpha: true,
            antialias: true
        });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setPixelRatio(window.devicePixelRatio);

        // global lighting
        const ambientLight = new THREE.AmbientLight(0xffffff, 0.6);
        scene.add(ambientLight)

        const directionalLight = new THREE.DirectionalLight(0xffffff, 0.8); // Mimics sunlight
        directionalLight.position.set(10, 20, 10);
        scene.add(directionalLight);

        window.addEventListener('resize', () => {
            const width = window.innerWidth;
            const height = window.innerHeight;

            renderer.setSize(width, height);
            camera.aspect = width / height;
            camera.updateProjectionMatrix();
        });

        // ============================================
        // VERTEX NOISE (kept local — see FRP_CENTRALIZATION_PLAN.md's "vertex
        // noise" note: this drifts a raw per-vertex Float32Array every frame,
        // which doesn't reduce to a few scalar properties, so it's not worth
        // routing through the editor. The editor only ever sends a single
        // `noiseIntensity` number per object; this world still owns the actual
        // per-frame drift, parameterized by that number and the ambient `t`
        // that rides along in every applyOps message.)
        // ============================================
        const vertexNoise = new Map(); // native object -> { base: Float32Array, intensity }
        const NOISE_MAX_DRIFT = 0.4; // units of drift at intensity 1
        const NOISE_TIME = 0.8; // temporal speed of the field
        const NOISE_SCALE = 0.8; // spatial frequency of the field

        function updateVertexNoise(t) {
            for (const [shape, info] of vertexNoise) {
                const base = info.base;
                const amp = info.intensity * NOISE_MAX_DRIFT;
                const pos = shape.geometry.attributes.position;
                const arr = pos.array;
                for (let i = 0; i < arr.length; i += 3) {
                    const bx = base[i], by = base[i + 1], bz = base[i + 2];
                    // cross-axis sin*cos -> a smooth swirling field; offset each axis from its base
                    arr[i] = bx + amp * Math.sin(by * NOISE_SCALE + t * NOISE_TIME) * Math.cos(bz * NOISE_SCALE + t * NOISE_TIME * 0.7);
                    arr[i + 1] = by + amp * Math.sin(bz * NOISE_SCALE + t * NOISE_TIME * 1.1) * Math.cos(bx * NOISE_SCALE + t * NOISE_TIME * 0.9);
                    arr[i + 2] = bz + amp * Math.sin(bx * NOISE_SCALE + t * NOISE_TIME * 0.8) * Math.cos(by * NOISE_SCALE + t * NOISE_TIME * 1.2);
                }
                pos.needsUpdate = true;
            }
        }

        // Sync one native object's noise-drift registration with its current
        // noiseIntensity prop (0 = not drifting / snap back to original positions).
        function syncNoise(mesh, intensity) {
            if (!mesh.geometry || !mesh.geometry.attributes.position) return;
            intensity = Math.max(0, Math.min(1, intensity || 0));

            if (intensity === 0) {
                const info = vertexNoise.get(mesh);
                if (info) {
                    mesh.geometry.attributes.position.array.set(info.base);
                    mesh.geometry.attributes.position.needsUpdate = true;
                    vertexNoise.delete(mesh);
                }
                return;
            }

            let info = vertexNoise.get(mesh);
            if (!info) {
                info = { base: mesh.geometry.attributes.position.array.slice(), intensity };
                vertexNoise.set(mesh, info);
            } else {
                info.intensity = intensity;
            }
        }

        // Render once so the (empty) scene isn't a blank frame before the first tick.
        renderer.render(scene, camera);

        // ============================================
        // GENERIC {id, kind, props} APPLY-DISPATCHER
        // ============================================
        // The editor (listener/listen2/editor.html) now owns the verb functions,
        // the FRP engine, and a plain state store per world. Once per frame it
        // posts the full current state of every live object for this world; this
        // file's only job is to turn {id, kind, props} into native THREE objects
        // and keep them in sync. It never evals script text.
        //
        // Rotation convention: props.rotation.{x,y,z} arrive already in RADIANS
        // (converted at the editor level, in the same place the old rotate()'s
        // deg->rad valueTransform used to run) — this world does zero conversion,
        // it just assigns straight to mesh.rotation, exactly like 2D's rotation
        // prop arrives already in Paper's native unit (degrees) and is assigned
        // as-is.
        //
        // nativeCache: id -> { kind, mesh, forceTransparent }
        const nativeCache = new Map();

        // Cached white circular sprite for rendering spherical cloud points.
        let _circleTexture = null;
        function getCircleTexture() {
            if (_circleTexture) return _circleTexture;

            const size = 64;
            const c = document.createElement('canvas');
            c.width = c.height = size;
            const ctx = c.getContext('2d');
            ctx.beginPath();
            ctx.arc(size / 2, size / 2, size / 2 * 0.9, 0, Math.PI * 2);
            ctx.fillStyle = 'white';   // white so material.color tints it
            ctx.fill();
            _circleTexture = new THREE.CanvasTexture(c);
            return _circleTexture;
        }

        // Box-Muller transform: a normally-distributed random number (mean 0, std dev 1).
        // Used to scatter cloud points with a dense core and wispy edges.
        function gaussianRandom() {
            let u = 0, v = 0;
            while (u === 0) u = Math.random();  // avoid log(0)
            while (v === 0) v = Math.random();
            return Math.sqrt(-2 * Math.log(u)) * Math.cos(2 * Math.PI * v);
        }

        // Kind-specific construction. `cloud`'s point scatter is randomly
        // generated once, here, from the small (quantity, spread, pointShape)
        // props — like vertex noise, the actual per-point Float32Array is a
        // native, largish, effectively-static data blob that isn't worth
        // shipping from the editor every frame; only the scalar knobs are.
        function constructNative(kind, props, cache) {
            switch (kind) {
                case 'cube': {
                    const geometry = new THREE.BoxGeometry(props.size.x, props.size.y, props.size.z);
                    const material = new THREE.MeshPhongMaterial();
                    return new THREE.Mesh(geometry, material);
                }
                case 'sphere': {
                    const geometry = new THREE.SphereGeometry(1, 32, 32);
                    geometry.scale(props.radius.x, props.radius.y, props.radius.z);
                    const material = new THREE.MeshPhongMaterial();
                    return new THREE.Mesh(geometry, material);
                }
                case 'torus': {
                    // TorusGeometry(outerRadius, tubeRadius, radialSegments, tubularSegments)
                    const geometry = new THREE.TorusGeometry(props.radius.outer, props.radius.tube, 16, 32);
                    const material = new THREE.MeshPhongMaterial();
                    return new THREE.Mesh(geometry, material);
                }
                case 'tube': {
                    const geometry = new THREE.CylinderGeometry(props.radius.top, props.radius.bottom, props.height, 32);
                    const material = new THREE.MeshPhongMaterial();
                    return new THREE.Mesh(geometry, material);
                }
                case 'cloud': {
                    const MAX_POINTS = 150;
                    const quantity = Math.max(0, Math.min(1, props.quantity));
                    const count = Math.max(4, Math.round(MAX_POINTS * quantity));

                    const positions = new Float32Array(count * 3);
                    for (let i = 0; i < count; i++) {
                        positions[i * 3] = gaussianRandom() * props.spread;
                        positions[i * 3 + 1] = gaussianRandom() * props.spread;
                        positions[i * 3 + 2] = gaussianRandom() * props.spread;
                    }

                    const geometry = new THREE.BufferGeometry();
                    geometry.setAttribute('position', new THREE.BufferAttribute(positions, 3));

                    const material = new THREE.PointsMaterial({
                        size: 0.1,               // world-unit point size; first thing to tune if too small/large
                        sizeAttenuation: true,   // points shrink with distance (depth cue)
                    });

                    let forceTransparent = false;
                    if (props.pointShape !== 'square') {
                        material.map = getCircleTexture();
                        material.alphaTest = 0.5; // discard corner fragments -> disc, with correct depth sorting
                        material.transparent = true;
                        forceTransparent = true; // independent of the opacity()-driven transparent flag
                    }
                    cache.forceTransparent = forceTransparent;
                    return new THREE.Points(geometry, material);
                }
                default:
                    console.error('applyOps: unknown 3D kind:', kind);
                    return null;
            }
        }

        function applyProps(mesh, props, cache) {
            mesh.position.set(props.position.x, props.position.y, props.position.z);
            mesh.rotation.set(props.rotation.x, props.rotation.y, props.rotation.z);
            mesh.scale.set(props.scale.x, props.scale.y, props.scale.z);

            const wantTransparent = !!props.transparent || !!cache.forceTransparent;
            const mats = Array.isArray(mesh.material) ? mesh.material : [mesh.material];
            for (const m of mats) {
                if (m.color && props.color) m.color.setRGB(props.color.r, props.color.g, props.color.b);
                m.opacity = props.opacity;
                if (m.transparent !== wantTransparent) {
                    m.transparent = wantTransparent;
                    m.needsUpdate = true;
                }
            }

            syncNoise(mesh, props.noiseIntensity);
        }

        function disposeNative(mesh) {
            scene.remove(mesh);
            vertexNoise.delete(mesh);
            if (mesh.geometry) mesh.geometry.dispose();
            if (mesh.material) {
                const mats = Array.isArray(mesh.material) ? mesh.material : [mesh.material];
                for (const m of mats) m.dispose();
            }
        }

        function applyOp({ id, kind, props }) {
            let cache = nativeCache.get(id);
            if (cache && cache.kind !== kind) {
                // Not expected in Phase 1 (nothing recreates ids yet) — handle
                // defensively by destroying and reconstructing.
                disposeNative(cache.mesh);
                nativeCache.delete(id);
                cache = null;
            }
            if (!cache) {
                cache = { kind, mesh: null, forceTransparent: false };
                const mesh = constructNative(kind, props, cache);
                if (!mesh) return;
                cache.mesh = mesh;
                scene.add(mesh);
                nativeCache.set(id, cache);
            }
            applyProps(cache.mesh, props, cache);
        }

        function destroyNative(id) {
            const cache = nativeCache.get(id);
            if (!cache) return;
            disposeNative(cache.mesh);
            nativeCache.delete(id);
        }

        // ============================================
        // CONNECT TO EDITOR
        // ============================================
        connectToEditor({
            onApplyOps: ({ t, ops, removed }) => {
                for (const id of removed) destroyNative(id);
                for (const op of ops) applyOp(op);
                updateVertexNoise(t);      // drift shape vertices (2nd pass, after props applied)
                renderer.render(scene, camera);
            },
        });

        console.log(`Three.js initialized, view size: ${window.innerWidth}x${window.innerHeight}`);
        debug('Ready');
    </script>
</body>

</html>
