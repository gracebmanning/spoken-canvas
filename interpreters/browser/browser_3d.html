<!DOCTYPE html>
<html>

<head>
    <meta charset="UTF-8">
    <title>Browser 3D Interpreter</title>
    <!-- Three.js for 3D graphics -->
    <script type="importmap">
      {
        "imports": {
          "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
          "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
        }
      }
    </script>
    <!-- Shared color palette (defines COLOR_MAP and parseColor globally) -->
    <script src="colors.js"></script>
    <!-- Shared interpreter plumbing (executeCommand + connectInterpreter) -->
    <script src="interpreter_core.js"></script>
    <style>
        body {
            margin: 0;
            padding: 0;
            overflow: hidden;
            background: transparent;
        }

        canvas {
            display: block;
            background: transparent;
        }

        #debug {
            position: absolute;
            bottom: 10px;
            right: 10px;
            color: red;
            font-family: monospace;
            font-size: 14px;
            background: rgba(0, 0, 0, 0.7);
            padding: 10px;
            display: block;
            z-index: 1000;
        }
    </style>
</head>

<body>
    <canvas id="canvas"></canvas>
    <div id="debug">3D: Connecting...</div>

    <script type="module">
        import * as THREE from 'three';

        const debugEl = document.getElementById('debug');
        let wsConnected = false;

        // Script state tracking
        let scriptState = {
            position: 0,
            totalWords: 0,
            plainText: "",
            words: [],
            shown: false
        };

        function debug(msg) {
            console.log(`3D: ${msg}`);
            debugEl.textContent = `3D: ${msg}`;
        }

        debug('3D: Browser 3D Interpreter starting...');

        // ============================================
        // THREE.JS SETUP
        // ============================================
        const canvas = document.getElementById('canvas');

        // initialize scene
        const scene = new THREE.Scene();

        // initialize camera (Field of View, Aspect Ratio, Near clipping, Far clipping)
        const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
        camera.position.z = 5;

        // initialize renderer
        const renderer = new THREE.WebGLRenderer({
            canvas: canvas,
            alpha: true,
            antialias: true
        });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setPixelRatio(window.devicePixelRatio);

        // global lighting
        const ambientLight = new THREE.AmbientLight(0xffffff, 0.6);
        scene.add(ambientLight)

        const directionalLight = new THREE.DirectionalLight(0xffffff, 0.8); // Mimics sunlight
        directionalLight.position.set(10, 20, 10);
        scene.add(directionalLight);

        window.addEventListener('resize', () => {
            const width = window.innerWidth;
            const height = window.innerHeight;

            renderer.setSize(width, height);
            camera.aspect = width / height;
            camera.updateProjectionMatrix();
        });

        // ============================================
        // ANIMATION ENGINE
        // ============================================
        // Accepts:
        // 1. Numeric value (tween from current value to target over 'duration' seconds)
        // 2. String expression (compiled to a function of t, seconds since page load; runs continuously)

        let t = 0; // seconds since page load

        // mesh => Map of "prop.subprop" path => function(t) => value
        const dynamicProps = new Map();

        function registerDynamic(mesh, path, fn) {
            if (!dynamicProps.has(mesh)) dynamicProps.set(mesh, new Map());
            dynamicProps.get(mesh).set(path, fn)
        }

        function unregisterDynamic(mesh, path) {
            const props = dynamicProps.get(mesh)
            if (!props) return;
            props.delete(path)
            if (props.size === 0) dynamicProps.delete(mesh);
        }

        // read/write a nested property like "position.x" on an object
        function setPath(obj, path, value) {
            const parts = path.split('.');
            let target = obj;
            for (let i = 0; i < parts.length - 1; i++) target = target[parts[i]];
            target[parts[parts.length - 1]] = value;
        }
        function getPath(obj, path) {
            return path.split('.').reduce((o, k) => o[k], obj);
        }

        // compile a new expression to a function of t.
        function compileExpression(expr) {
            return new Function('t', `return ${expr};`);
        }

        function easeOutCubic(x) {
            return 1 - Math.pow(1 - x, 3);
        }

        // register a duration-based tween
        // animate 'path' from its current value to 'targetValue' over 'duration' seconds, then self-unregister.
        function registerTween(mesh, path, targetValue, duration) {
            const fromValue = getPath(mesh, path);
            const startT = t;
            const endT = startT + duration;
            registerDynamic(mesh, path, (now) => {
                if (now >= endT) {
                    unregisterDynamic(mesh, path);
                    return targetValue;
                }
                const progress = (now - startT) / duration;
                return fromValue + (targetValue - fromValue) * easeOutCubic(progress);
            });
        }

        /**
         * Dispatch x/y/z to the right slot in dynamicProps.
         *
         * @param {object}   shape          the Three.js mesh
         * @param {string}   propName       "position" or "rotation"
         * @param {*}        x,y,z          numeric, string expression, or undefined
         * @param {number}   duration       seconds; applies to numeric args only
         * @param {function} valueTransform converts user value to property unit
         *                                  (identity for position, deg->rad for rotation)
        */
        function applyTransform(shape, propName, x, y, z, duration, valueTransform = (v) => v) {
            for (const [axis, arg] of [['x', x], ['y', y], ['z', z]]) {
                const path = `${propName}.${axis}`;

                if (typeof arg === 'string') {
                    // Continuous expression. Overwrites any existing dynamic on this path.
                    const fn = compileExpression(arg);
                    registerDynamic(shape, path, (now) => valueTransform(fn(now)));
                } else if (typeof arg === 'number') {
                    // Numeric: stop any current tween/expression on this path first,
                    // otherwise it would keep writing to the property next frame.
                    unregisterDynamic(shape, path);
                    const targetValue = valueTransform(arg);
                    if (duration > 0) {
                        registerTween(shape, path, targetValue, duration);
                    } else {
                        setPath(shape, path, targetValue);
                    }
                }
            }
        }

        // per-frame: advance t, eval every registered dynamic expression, write result.
        // an error-throwing expression is logged once and unregistered.
        function tickDynamicProps(nowMs) {
            t = nowMs / 1000;
            for (const [mesh, props] of dynamicProps) {
                for (const [path, fn] of props) {
                    try {
                        setPath(mesh, path, fn(t));
                    } catch (e) {
                        console.error(`Expression error on ${path}, unregistering:`, e.message);
                        unregisterDynamic(mesh, path);
                    }
                }
            }
        }

        // animation / render loop
        function animate(nowMs) {
            requestAnimationFrame(animate);
            if (nowMs !== undefined) {
                tickDynamicProps(nowMs);
            }
            renderer.render(scene, camera);
        }
        requestAnimationFrame(animate);

        // ============================================
        // INTERPRETER FUNCTIONS (called by eval)
        // ============================================
        /**
         * Create a box mesh and add it to the scene.
         * @param {number} sizex    edge length on X axis. Defaults to 1.0.
         * @param {number} sizey    edge length on Y axis. Defaults to sizex.
         * @param {number} sizez    edge length on Z axis. Defaults to sizex.
         * @param {string} color    named color (ex: "red") or hex color code string. Defaults to "white".
         * @return {THREE.mesh}     the created cube mesh.
        */
        function cube(sizex = 1.0, sizey, sizez, color = "white") {
            if (typeof sizey === 'string') { color = sizey; sizey = undefined; }
            else if (typeof sizez === 'string') { color = sizez; sizez = undefined; }

            if (sizey === undefined) sizey = sizex;
            if (sizez === undefined) sizez = sizex;

            const geometry = new THREE.BoxGeometry(sizex, sizey, sizez);
            const material = new THREE.MeshPhongMaterial({ color: parseColor(color) });
            const mesh = new THREE.Mesh(geometry, material);
            scene.add(mesh);
            return mesh;
        }

        /**
         * Create a sphere or ellipsoid.
         *
         * A string in any size slot is the color, and unfilled sizes default to radx for the uniform case.
         *
         * @param {number} radx   radius on X. Default 0.5.
         * @param {number} rady   radius on Y. Defaults to radx.
         * @param {number} radz   radius on Z. Defaults to radx.
         * @param {string} color  named color or hex. Default "white".
         *
        */
        function sphere(radx = 0.5, rady, radz, color = "white") {
            if (typeof rady === 'string') { color = rady; rady = undefined; }
            else if (typeof radz === 'string') { color = radz; radz = undefined; }

            if (rady === undefined) rady = radx;
            if (radz === undefined) radz = radx;

            const geometry = new THREE.SphereGeometry(1, 32, 32);
            geometry.scale(radx, rady, radz);   // bake ellipsoid into vertices
            const material = new THREE.MeshPhongMaterial({ color: parseColor(color) });
            const mesh = new THREE.Mesh(geometry, material);
            scene.add(mesh);
            return mesh;
        }

        /**
         * Create a torus (donut shape).
         * String shorthand: torus(0.6, "orange") -> outer 0.6, default tube, orange.
         *
         * @param {number} radx   outer ring radius (center of torus to center of tube). Default 0.5.
         * @param {number} rady   tube radius (thickness of the ring). Default 0.25.
         * @param {string} color  named color or hex. Default "white".
         *
         */
        function torus(radx = 0.5, rady = 0.25, color = "white") {
            if (typeof rady === 'string') { color = rady; rady = 0.25; }

            // TorusGeometry(outerRadius, tubeRadius, radialSegments, tubularSegments)
            // 16/32 segments is a good smoothness/cost balance for typical sizes.
            const geometry = new THREE.TorusGeometry(radx, rady, 16, 32);
            const material = new THREE.MeshPhongMaterial({ color: parseColor(color) });
            const mesh = new THREE.Mesh(geometry, material);
            scene.add(mesh);
            return mesh;
        }

        function tube(rad1 = 0.5, rad2, height = 0.5, color = "white") {
            return;
        }

        /**
         * Create a point cloud. Points are scattered with a Gaussian distribution (dense
         * core, soft edges) and drawn via THREE.Points.
         *
         * @param {number} density  0..1, fraction of MAX_POINTS used. 1.0 = 100
         *                           points, 0.5 = 50.
         * @param {number} spread    standard deviation of the scatter — larger
         *                           is a wider, looser cloud. 1.0 is a good
         *                           visible default; 0.5 tighter, 2.0 wider.
         * @param {string} color     named color or hex. Default "white".
         *
         * Returns a THREE.Points object.
         *
         */
        function cloud(density = 1.0, spread = 1.0, color = "white") {
            // Box-Muller transform: a normally-distributed random number (mean 0, std dev 1).
            // Used to scatter points with a dense core and wispy edges.
            function gaussianRandom() {
                let u = 0, v = 0;
                while (u === 0) u = Math.random();  // avoid log(0)
                while (v === 0) v = Math.random();
                return Math.sqrt(-2 * Math.log(u)) * Math.cos(2 * Math.PI * v);
            }

            // String shorthand: cloud(0.5, "cyan") -> density 0.5, default spread.
            if (typeof spread === 'string') { color = spread; spread = 1.0; }

            const MAX_POINTS = 100;
            density = Math.max(0, Math.min(1, density));
            const count = Math.max(4, Math.round(MAX_POINTS * density));

            // Three coordinates per point, scattered by a Gaussian * spread.
            const positions = new Float32Array(count * 3);
            for (let i = 0; i < count; i++) {
                positions[i * 3] = gaussianRandom() * spread;
                positions[i * 3 + 1] = gaussianRandom() * spread;
                positions[i * 3 + 2] = gaussianRandom() * spread;
            }

            const geometry = new THREE.BufferGeometry();
            geometry.setAttribute('position', new THREE.BufferAttribute(positions, 3));

            const material = new THREE.PointsMaterial({
                color: parseColor(color),
                size: 0.1,               // world-unit point size; first thing to tune if too small/large
                sizeAttenuation: true,   // points shrink with distance (depth cue)
            });

            const points = new THREE.Points(geometry, material);
            scene.add(points);
            return points;
        }

        /**
         * Move a shape. Each axis arg can be:
         * 1) a number => snap (duration = 0) or tween (duration > 0)
         * 2) a string => compiled to a per-frame expression, ex: "t * 0.5"
         * 
         * Mixed args are allowed.
         * Ex: move(b, "t * 0.5", 0, 0, 2) updates X axis via expression while Y and Z tween to 0 over 2 seconds.
         * 
         * @param {THREE.Object3D} shape
         * @param {number|string}  x         target X position
         * @param {number|string}  y         target Y position
         * @param {number|string}  z         target Z position
         * @param {number}         duration  seconds; applies to numeric args only. 0 (default) = instant.
        */
        function move(shape, x = 0.0, y = 0.0, z = 0.0, duration = 0) {
            if (!shape) return;
            applyTransform(shape, 'position', x, y, z, duration);
        }

        /**
         * Rotate a shape. Angles are in degrees, converted to radians internally for Three.js.
         * Conversion is applied to expression results, too, so "t * 60" means 60 deg/sec.
         * 
         * @param {THREE.Object3D} shape
         * @param {number|string}  rx        degrees around X (or expression string)
         * @param {number|string}  ry        degrees around Y (or expression string)
         * @param {number|string}  rz        degrees around Z (or expression string)
         * @param {number}         duration  seconds; applies to numeric args only. 0 (default) = instant.
         * Examples:
         *   rotate(b1, 0, 90, 0)            snap to 90 deg around Y
         *   rotate(b1, 0, 90, 0, 1)         tween to 90 over 1 second
         *   rotate(b1, 0, "t * 60", 0)      spin at 60 deg/sec around Y, forever
        */
        function rotate(shape, rx = 0.0, ry = 0.0, rz = 0.0, duration = 0) {
            if (!shape) return;
            const degToRad = (deg) => deg * Math.PI / 180;
            applyTransform(shape, 'rotation', rx, ry, rz, duration, degToRad);
        }

        /**
         * Scale a shape.
         * 
         * Shorthand: if sy or sz is undefined, it defaults to sx. So
         *   scale(b1, 2)            -> uniform 2.0 on all three axes
         *   scale(b1, "1 + 0.2 * Math.sin(t * 2)")  -> uniform pulse via expression
         * To scale only one axis, pass 1 for the others explicitly:
         *   scale(b1, 2, 1, 1)      -> stretch X only, leave Y/Z at 1.0
         * 
         * Note: calling scale(b1) with no other args resets to (1, 1, 1).
         * 
         * @param {THREE.Object3D} shape
         * @param {number|string}  sx        scale factor on X
         * @param {number|string}  sy        scale factor on Y (defaults to sx)
         * @param {number|string}  sz        scale factor on Z (defaults to sx)
         * @param {number}         duration  seconds; applies to numeric args only. 0 (default) = instant.
        */
        function scale(shape, sx = 1.0, sy, sz, duration = 0) {
            if (!shape) return;
            if (sy === undefined) sy = sx;
            if (sz === undefined) sz = sx;

            applyTransform(shape, 'scale', sx, sy, sz, duration);
        }

        // Needs attention: TD version took *shapes as a param
        function audio_reactive(shapes, low = 0.8, high = 1.0) {
            return;
        }

        function color(shape, color) {
            return;
        }

        function opacity(shape, value = 1.0) {
            return;
        }

        function remove(shape) {
            return;
        }

        /**
         * Remove all shapes from the scene. Lights and camera are preserved.
        */
        function clear() {
            dynamicProps.clear(); // stop every tween/expression

            const toRemove = scene.children.filter(
                child => child.isMesh || child.isPoints
            )

            for (const child of toRemove) {
                scene.remove(child);
                if (child.geometry) child.geometry.dispose();
                if (child.material) {
                    // a mesh may carry an array of materials; handle both cases.
                    if (Array.isArray(child.material)) {
                        for (const m of child.material) m.dispose();
                    } else {
                        child.material.dispose();
                    }
                }
            }
        }

        // ============================================
        // MAKE FUNCTIONS GLOBALLY ACCESSIBLE
        // ============================================
        // Exposed on window so eval'd commands (which run in global scope) can call them.
        // THREE is exposed so a command can reach for raw Three.js when a helper doesn't cover what it needs.
        window.THREE = THREE;
        window.scene = scene;
        window.camera = camera;
        window.renderer = renderer;
        window.cube = cube;
        window.sphere = sphere;
        window.torus = torus;
        window.tube = tube;
        window.cloud = cloud;
        window.move = move;
        window.rotate = rotate;
        window.scale = scale;
        window.audio_reactive = audio_reactive;
        window.color = color;
        window.opacity = opacity;
        window.remove = remove;
        window.clear = clear;

        // ============================================
        // WEBSOCKET CONNECTION
        // ============================================

        connectInterpreter({
            target: 'browser_3d',
            onStatus: (msg) => debug(msg),
            onExecute: (code) => {
                debug('Executing: ' + code);
                console.log('>>> EVAL:', code);
                executeCommand(code, {
                    onError: (e) => debug('Error: ' + e.message),
                });
            },
            onPosition: (data) => {
                scriptState.position = data.position;
                if (data.totalWords) scriptState.totalWords = data.totalWords;
                if (data.words) scriptState.words = data.words;
                if (data.plainText) scriptState.plainText = data.plainText;

                const progress = scriptState.totalWords > 0 ?
                    (scriptState.position / scriptState.totalWords * 100).toFixed(0) : 0;
                debug(`Position: ${scriptState.position}/${scriptState.totalWords} (${progress}%)`);
            },
        });

        console.log(`Three.js initialized, view size: ${window.innerWidth}x${window.innerHeight}`);
        debug('Ready');
    </script>
</body>

</html>
