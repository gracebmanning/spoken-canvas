<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Script Editor</title>

  <!-- CodeMirror (code editor) -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.16/codemirror.min.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.16/theme/material-darker.min.css">
  <script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.16/codemirror.min.js"></script>

  <script src="/interpreters/colors.js"></script>
  <script src="/interpreters/frp.js"></script>
  <script src="/interpreters/api_2d.js"></script>
  <script src="/interpreters/api_3d.js"></script>

  <style>
    html,
    body {
      margin: 0;
      height: 100%;
      background: #212121;
      color: #e0e0e0;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    }

    body {
      display: flex;
      flex-direction: column;
    }

    header {
      padding: 10px 16px;
      background: #1a1a1a;
      border-bottom: 1px solid #333;
      display: flex;
      align-items: center;
      gap: 12px;
      flex: 0 0 auto;
    }

    header h1 {
      font-size: 15px;
      font-weight: 600;
      margin: 0;
    }

    header .path {
      font-size: 12px;
      color: #888;
      font-family: monospace;
    }

    header .counter {
      margin-left: auto;
      font-size: 12px;
      color: #ffd54f;
      font-family: monospace;
      white-space: nowrap;
    }

    header .toggle-btn {
      background: #2a2a2a;
      color: #e0e0e0;
      border: 1px solid #444;
      border-radius: 4px;
      font-size: 12px;
      padding: 4px 10px;
      cursor: pointer;
    }

    header .toggle-btn:hover {
      background: #333;
    }

    /* Responsive split: side by side when wide, stacked when narrow. */
    .main {
      flex: 1;
      min-height: 0;
      display: flex;
      flex-direction: column;
    }

    @media (min-width: 900px) {
      .main {
        flex-direction: row;
      }
    }

    .pane {
      flex: 1 1 50%;
      min-width: 0;
      min-height: 0;
      overflow: hidden;
    }

    /* ---- API sidebar --------------------------------------------------
       Content is a same-origin iframe (/api-docs.html) — this pane is just
       the collapsible container + expand/collapse transition. */
    .sidebar-pane {
      flex: 0 0 auto;
      width: 320px;
      max-height: 260px;
      overflow: hidden;
      background: #1a1a1a;
      border-bottom: 1px solid #333;
      box-sizing: border-box;
      transition: width 0.15s ease, max-height 0.15s ease;
    }

    @media (min-width: 900px) {
      .sidebar-pane {
        max-height: none;
        border-bottom: none;
        border-right: 1px solid #333;
      }
    }

    .sidebar-pane.collapsed {
      width: 0;
      max-height: 0;
      border: 0;
    }

    .sidebar-pane iframe {
      display: block;
      width: 320px;
      height: 100%;
      min-height: 260px;
      border: 0;
    }

    @media (min-width: 900px) {
      .sidebar-pane iframe {
        min-height: 0;
        height: 100%;
      }
    }

    .output-pane {
      position: relative;
      background: #000;
      border-top: 1px solid #333;
    }

    @media (min-width: 900px) {
      .output-pane {
        border-top: none;
        border-left: 1px solid #333;
      }
    }

    .CodeMirror {
      height: 100%;
      font-size: 14px;
      font-family: "SFMono-Regular", Menlo, Consolas, monospace;
    }

    /* The word the listener is currently on. */
    .cm-current-word {
      background: #ffd54f;
      color: #000;
      border-radius: 2px;
    }

    /* Layered interpreter iframes, scaled to fit the output pane. */
    .frame {
      position: absolute;
      top: 0;
      left: 0;
      width: 1920px;
      height: 1080px;
      border: 0;
      background: transparent;
      transform-origin: top left;
    }

    #frame-3d {
      z-index: 1;
    }

    #frame-2d {
      z-index: 2;
    }
  </style>
</head>

<body>
  <header>
    <h1>Script Editor</h1>
    <span class="path" id="script-path"></span>
    <span class="counter" id="word-counter"></span>
    <button class="toggle-btn" id="toggle-sidebar" style="margin-left: 8px;">API ▾</button>
  </header>

  <div class="main">
    <div class="pane sidebar-pane" id="sidebar">
      <iframe src="/api-docs.html" title="API reference"></iframe>
    </div>
    <div class="pane editor-pane">
      <textarea id="code"></textarea>
    </div>
    <div class="pane output-pane" id="stage">
      <iframe class="frame" id="frame-3d" src="/interpreters/browser_3d.html"></iframe>
      <iframe class="frame" id="frame-2d" src="/interpreters/browser_2d.html"></iframe>
    </div>
  </div>

  <script>
    // ---- API sidebar: expand/collapse toggle ------------------------------
    // Docs content itself lives in its own iframe (/api-docs.html), so this
    // page only owns showing/hiding the pane that embeds it.
    const sidebarEl = document.getElementById("sidebar");
    const toggleSidebarBtn = document.getElementById("toggle-sidebar");
    toggleSidebarBtn.addEventListener("click", () => {
      const collapsed = sidebarEl.classList.toggle("collapsed");
      toggleSidebarBtn.textContent = collapsed ? "API ▸" : "API ▾";
    });

    const editor = CodeMirror.fromTextArea(document.getElementById("code"), {
      lineNumbers: true,
      lineWrapping: true,
      theme: "material-darker",
      mode: null,
    });

    // Script evaluates here, against a plain per-world state store of
    // {id, kind, props}. Once per frame (see tick() below) the editor resolves
    // every dynamic prop via frp.js's tickDynamicProps(), then posts each
    // world's full current state down as {type:"applyOps", t, ops, removed}.
    // Each world just turns that into native Paper.js/Three.js objects — it
    // never sees script text and never calls eval.
    const WORLD_NAMES = ["browser_2d", "browser_3d"];

    // Per-world state store: Map<id, {kind, props}>. `props` is a plain object
    // whose paths are exactly what frp.js's registerDynamic/setPath/getPath
    // already operate on generically — it's just a plain object instead of a
    // live Paper/Three object now. Creator verbs allocate a new id+entry;
    // mutator verbs look up an existing id (via the handle) and modify props;
    // remove()/clear() delete entries and record removed ids for the next tick.
    const stateStores = {};      // world -> Map<id, {kind, props}>
    const removedSinceTick = {}; // world -> [id, ...] destroyed since the last tick
    const idCounters = {};       // world -> next id

    // Isolated one-liner so Phase 2 can swap this for a
    // (bracket source position, let-binding name) identity scheme later
    // without touching anything else.
    function nextId(world) {
      return idCounters[world]++;
    }

    function removeFromWorld(world, id) {
      const store = stateStores[world];
      const entry = store.get(id);
      if (!entry) return;
      dynamicProps.delete(entry.props); // stop any active tweens/expressions
      store.delete(id);
      removedSinceTick[world].push(id);
    }

    // clear() is just "remove everything" — translated into repeated
    // removeFromWorld() rather than a second code path, and importantly scoped
    // to THIS world's entries only: dynamicProps is now a single Map shared by
    // both worlds (frp.js runs once, centrally), so a blanket
    // dynamicProps.clear() here would also wipe the other world's animations.
    function clearWorld(world) {
      for (const id of Array.from(stateStores[world].keys())) removeFromWorld(world, id);
    }

    function resolveHandle(world, handle) {
      if (!handle || handle.__world !== world) {
        console.error(`[${world}] invalid handle (from another world?):`, handle);
        return null;
      }
      const entry = stateStores[world].get(handle.__id);
      if (!entry) console.error(`[${world}] handle refers to a removed/unknown id:`, handle);
      return entry || null;
    }

    // ---- Continuous-bracket reconciliation (PHASE2 plan section D) --------
    // Calling a creator function every tick (since plain `[code]` brackets are
    // continuous by default — see PHASE2 plan section C) must not spawn a
    // duplicate object every frame. `reconcileCreate` is the shared preamble
    // every creator function below goes through.
    //
    // Ambient reconciliation context: set to {bracketId, callIndex} for the
    // duration of one continuous bracket's registered-function invocation (see
    // tick() below), and cleared right after. A stack (not just one variable)
    // defensively supports nested invocation, though nothing in this codebase
    // is expected to nest.
    let reconcileCtx = null;
    const reconcileCtxStack = [];
    function pushReconcileCtx(bracketId) {
      reconcileCtxStack.push(reconcileCtx);
      reconcileCtx = { bracketId, callIndex: 0, approachIndex: 0 };
    }
    function popReconcileCtx() {
      reconcileCtx = reconcileCtxStack.pop();
    }

    // Per-bracket persistent registry: bracketId -> Map<callIndex, {creatorFn, world, id}>.
    // Survives across ticks; only cleared when a bracket is re-registered
    // (landed on again — see registerContinuous()) or on restart().
    const reconcileRegistry = new Map();

    /**
     * Shared preamble for every creator function (circle/square/.../cube/.../
     * cloud). `buildProps(existingProps)` resolves this call's arguments into
     * a props object: called with `undefined` for a fresh creation (build a
     * whole new object, including the generic Item-lifecycle defaults —
     * position/rotation/scaling-or-scale/opacity/... — that move()/rotate()/
     * scale()/fade() own from then on), or with the existing entry's `props`
     * for a reconciled update (write only the fields this creator call itself
     * governs — e.g. radius/size/color/content — directly onto that SAME
     * object, so any dynamicSize/dynamicColor/dynamicProp `.register()` calls
     * made inside it register against the correct, persistent item identity).
     * Must return the props object (same reference it was given, if any).
     *
     * - Not inside a continuous bracket invocation (one-off `[!...]`, or
     *   called from anywhere else): behaves exactly like Phase 1 — always
     *   allocates a fresh id.
     * - Inside one, keyed by (bracketId, callIndex): no existing entry ->
     *   allocate fresh and remember it; existing entry with the same
     *   `creatorFn` -> recompute props onto the existing entry, no new id;
     *   existing entry with a *different* `creatorFn` (e.g. circle -> square)
     *   -> remove the old one and allocate fresh, as if there had been none.
     */
    function reconcileCreate(world, kind, creatorFn, buildProps) {
      if (!reconcileCtx) {
        const id = nextId(world);
        const props = buildProps(undefined);
        stateStores[world].set(id, { kind, props });
        return { __world: world, __id: id };
      }

      const { bracketId } = reconcileCtx;
      const callIndex = reconcileCtx.callIndex++;
      let slots = reconcileRegistry.get(bracketId);
      if (!slots) { slots = new Map(); reconcileRegistry.set(bracketId, slots); }

      const existing = slots.get(callIndex);
      if (existing && existing.creatorFn === creatorFn) {
        const entry = stateStores[existing.world].get(existing.id);
        if (entry) {
          buildProps(entry.props); // mutated in place; entry.props reference is unchanged
          return { __world: existing.world, __id: existing.id };
        }
        // Entry vanished from under us (e.g. removed by script) — fall through
        // and allocate fresh, same as a creatorFn mismatch below.
      }
      if (existing) {
        removeFromWorld(existing.world, existing.id); // creatorFn differs (or stale) — tear down, same path as remove()
      }
      const id = nextId(world);
      const props = buildProps(undefined);
      stateStores[world].set(id, { kind, props });
      slots.set(callIndex, { creatorFn, world, id });
      return { __world: world, __id: id };
    }

    // Per-bracket persistent registry for approach() — bracketId -> Map<approachIndex, lastValue>.
    // Same call-order-keyed-identity trick as reconcileCreate/reconcileRegistry
    // above, just for a plain running number instead of a created item: as
    // long as a bracket calls approach() the same number of times, in the
    // same order, on every tick (already the assumption reconcileCreate makes
    // for creator calls), each call site gets its own persistent slot for
    // free, with no explicit key from the script.
    const approachRegistry = new Map();

    /**
     * Ease the value at THIS call site toward `target`, closing `rate` of the
     * remaining gap every tick — a plain one-line exponential approach filter,
     * usable anywhere a value is expected: move(c, x, approach(MIC.pitch)).
     * Drop-in replacement for reading a live/noisy/jumpy signal directly when
     * you want the animation to chase it smoothly instead of snapping to it
     * every frame (see MIC.pitch, which is itself a live, ever-changing value).
     *
     * No key to manage: called outside a continuous bracket (a one-off
     * `[!...]`, or anywhere else with no ambient reconcileCtx) there's no
     * stable per-tick call site to persist against, so it just returns
     * `target` as-is — nothing to ease across, since there's no "next tick"
     * for this call.
     */
    function approach(target, rate = 0.1) {
      if (!reconcileCtx) return target;

      const { bracketId } = reconcileCtx;
      const index = reconcileCtx.approachIndex++;
      let slots = approachRegistry.get(bracketId);
      if (!slots) { slots = new Map(); approachRegistry.set(bracketId, slots); }

      const prev = slots.has(index) ? slots.get(index) : target; // first tick: start AT the target, don't ease in from 0
      const next = prev + (target - prev) * rate;
      slots.set(index, next);
      return next;
    }

    // ---- Per-bracket signals: elapsed() / lines_since() -------------------
    // bracketId -> { line, firedAt }. Written every time a continuous bracket
    // is landed on (see registerContinuous), so re-landing — including
    // stepping backward onto it — restarts both signals from zero. Cleared on
    // restart() alongside the other per-bracket registries.
    const bracketMeta = new Map();

    // Line (0-based) of the word the cursor is currently on, or null when the
    // cursor is at the pre-start sentinel / there are no words.
    function cursorLine() {
      if (wordIndex < 0 || !words.length) return null;
      return editor.posFromIndex(words[wordIndex].from).line;
    }

    /**
     * Seconds since THIS bracket last fired — the event ("this instruction
     * ran") made continuously readable, so no flag has to record that it did.
     * Holds and windows are then just expressions over it, e.g.
     * `elapsed() < 3 ? 1.35 : 1` (snap to 1.35 for three seconds, then back).
     *
     * Like approach(), there's no key to manage: called outside a continuous
     * bracket (a one-off `[!...]`) there's no "next tick" for this call site,
     * so it returns 0 — the instant it fired.
     */
    function elapsed() {
      if (!reconcileCtx) return 0;
      const meta = bracketMeta.get(reconcileCtx.bracketId);
      return meta ? TIME.t - meta.firedAt : 0;
    }

    /**
     * How many lines the cursor has advanced past THIS bracket's own line: 0
     * while the reader is still on it, 1 on the next line, and so on. Relative
     * by construction, so inserting lines above never invalidates it.
     *
     * Deliberately a number, not a boolean window — the author writes the
     * predicate: `lines_since() < 3`, `lines_since() >= 2 && lines_since() < 6`.
     * Returns 0 outside a continuous bracket, and while the cursor sits at the
     * pre-start sentinel.
     */
    function lines_since() {
      if (!reconcileCtx) return 0;
      const meta = bracketMeta.get(reconcileCtx.bracketId);
      const cur = cursorLine();
      if (!meta || cur === null) return 0;
      return cur - meta.line;
    }

    // Verb-function namespaces, unchanged from Phase 1 — built once, reused
    // across restarts (only scriptScope, below, gets rebuilt).
    const worldApis = {
      browser_2d: makeWorld2DApi('browser_2d'),
      browser_3d: makeWorld3DApi('browser_3d'),
    };

    function resetWorldState() {
      for (const world of WORLD_NAMES) {
        stateStores[world] = new Map();
        removedSinceTick[world] = [];
        idCounters[world] = 1;
      }
    }
    resetWorldState();

    // Continuous-bracket registry (PHASE2 plan section D): bracketId -> the
    // zero-argument function registered for a plain `[code]` bracket, invoked
    // every tick (see tick() below) until restart() or until the same
    // bracket is re-triggered (which just replaces the registration).
    const continuousBrackets = new Map();

    // "Words completed" — spoken words only, excluding bracket/command tokens
    // — as a closure over the word-tracking state declared further below
    // (words/wordIndex); see PHASE2 plan section B for why this is a method,
    // not a plain property the way TIME/MIC are.
    const SCRIPT = {
      words_completed: () => words.slice(0, Math.max(0, wordIndex)).filter((w) => !w.cmd).length,
    };

    // One shared script-level scope (PHASE2 plan section A) — replaces
    // Phase 1's one-`with`-scope-per-world model. browser_2d/browser_3d are
    // reached only via this explicit prefix (`browser_2d.circle(...)` /
    // `browser_3d.move(...)`); no verb function is ever bare-reachable — this
    // is required, not just tidy, since move/rotate/scale/remove/clear/
    // audio_reactive exist in both APIs with different signatures and a flat
    // scope can't hold two same-named functions. TIME/MIC are frp.js's
    // persistent, ambient signal objects (mutated in place by tick(), never
    // rebuilt) — reached the same way. `let`-bound user variables become own
    // properties of this same object (see globalizeDeclarationsForWith
    // below); restart() replaces the whole object with a fresh one, wiping
    // user bindings without needing to touch worldApis/TIME/MIC/SCRIPT.
    function buildScriptScope() {
      return {
        browser_2d: worldApis.browser_2d,
        browser_3d: worldApis.browser_3d,
        TIME: window.TIME,
        MIC: window.MIC,
        SCRIPT,
        approach,
        elapsed,
        lines_since,
      };
    }
    let scriptScope = buildScriptScope();

    /**
     * Promote top-of-statement `let`/`const`/`var` declarations to plain
     * assignment (NOT `window.NAME =` — that's interpreter_core.js's old,
     * global-scope-only version, wrong for this scheme) so `with` binds them
     * onto `scope`.
     *
     * `with`'s identifier resolution only intercepts a name if it's already
     * a property of `scope` (its HasBinding check is effectively `name in
     * scope`, including the prototype chain) — so a *first* assignment to a
     * name `with` doesn't yet know about would fall through and leak onto the
     * global object instead, in non-strict mode. Pre-declaring every name this
     * command will assign (as `undefined`, if not already present) closes that
     * hole before eval'ing.
     */
    function globalizeDeclarationsForWith(code, scope) {
      for (const m of code.matchAll(/(^|\n|;)(\s*)(?:let|const|var)\s+(\w+)\s*=/g)) {
        const name = m[3];
        if (!(name in scope)) scope[name] = undefined;
      }
      return code.replace(/(^|\n|;)(\s*)(?:let|const|var)\s+(\w+)\s*=/g, "$1$2$3 =");
    }

    // Evaluate `code` once against `scriptScope`, discarding the result — the
    // `[!code]` one-off path (PHASE2 plan section C: exactly Phase 1's
    // one-shot semantics, no reconciliation, no registration). Must be a
    // DIRECT eval call (`eval(...)`, not the indirect `(0, eval)(...)` form
    // interpreter_core.js's old executeCommand used) — indirect eval always
    // runs in the global scope and would never see the `with` binding below;
    // only a direct eval call sees the lexical scope (including `with`) it's
    // written in. This requires this whole page's script to stay non-strict
    // (no "use strict", not a module) since `with` is disallowed in strict mode.
    function evalOneShot(code) {
      const rewritten = globalizeDeclarationsForWith(code, scriptScope);
      try {
        with (scriptScope) {
          eval(rewritten);
        }
      } catch (e) {
        console.error("execution error:", e);
      }
    }

    // Compile `code` into a zero-argument function — evaluated ONCE against
    // scriptScope to produce the function value — then register it under
    // `bracketId` to be invoked every tick from now on (see tick() below):
    // the plain `[code]` continuous path. Landing on
    // the SAME bracket again just replaces the registration; per section D
    // that also resets this bracket's reconciliation call-site history, so
    // its next invocation treats every creator call as fresh (orphaning
    // whatever it previously created — accepted, not solved here).
    function registerContinuous(bracketId, code, line) {
      const rewritten = globalizeDeclarationsForWith(code, scriptScope);
      let fn;
      try {
        with (scriptScope) {
          fn = eval(`(() => {\n${rewritten}\n})`);
        }
      } catch (e) {
        console.error("execution error (compiling continuous bracket):", e);
        return;
      }
      reconcileRegistry.delete(bracketId);
      approachRegistry.delete(bracketId);
      // Landing on the bracket IS the event: (re)start elapsed()/lines_since()
      // from here, so stepping backward onto it re-arms both from zero.
      bracketMeta.set(bracketId, { line, firedAt: TIME.t });
      continuousBrackets.set(bracketId, fn);
    }

    // ---- Command dispatch -------------------------------------------------
    // A bracket's content is just `code` now — no `[world: code]` colon-prefix
    // routing (Phase 1's per-bracket single-target model is gone; world
    // targeting is fully explicit in the code itself, e.g.
    // `browser_2d.circle(...)`, per PHASE2 plan section A). The only thing
    // parsed here is a leading `!`, choosing between the two bracket forms
    // from section C.
    const TARGET_FRAMES = {
      browser_2d: document.getElementById("frame-2d"),
      browser_3d: document.getElementById("frame-3d"),
    };

    function executeCommandToken(token) {
      const raw = editor.getValue().slice(token.from, token.to); // "[ ... ]"
      const content = raw.slice(1, -1).trim();
      if (content.toUpperCase() === "RESET()") {
        // Sugar for "clear both worlds", run through the same one-off path —
        // not a second, separate fan-out mechanism (PHASE2 plan section C).
        evalOneShot("browser_2d.clear(); browser_3d.clear();");
        return;
      }
      if (content.startsWith("!")) {
        evalOneShot(content.slice(1).trim());
      } else {
        const bracketId = `${token.from}:${token.to}`; // stable source-position key
        registerContinuous(bracketId, content, editor.posFromIndex(token.from).line);
      }
    }

    // ---- Output iframe scaling ------------------------------------------
    // Interpreters render at a fixed 1920x1080; scale to fit the output pane.
    const stage = document.getElementById("stage");
    const frames = [document.getElementById("frame-3d"), document.getElementById("frame-2d")];

    function fitStage() {
      const w = stage.clientWidth, h = stage.clientHeight;
      const scale = Math.min(w / 1920, h / 1080);
      const offsetX = (w - 1920 * scale) / 2;
      const offsetY = (h - 1080 * scale) / 2;
      const transform = `translate(${offsetX}px, ${offsetY}px) scale(${scale})`;
      frames.forEach((f) => { f.style.transform = transform; });
    }

    window.addEventListener("resize", fitStage);
    if (window.ResizeObserver) new ResizeObserver(fitStage).observe(stage);
    fitStage();

    // ---- FRP clock + microphone (owned here, drives the FRP engine) -----
    // The editor is the single source of the animation clock and the mic level,
    // AND the only place frp.js's tickDynamicProps runs at all. The mic is
    // opened once at the top level so there's a single
    // permission prompt and one analyser. Once per frame (see tick() below) we
    // advance every registered dynamic ourselves, then post each world's
    // resolved {id, kind, props} state down as {type:"applyOps", ...}.
    // Interpreters never touch getUserMedia, requestAnimationFrame, or frp.js
    // themselves anymore — see interpreters/browser/browser_2d.html /
    // browser_3d.html's applyOps handlers.
    const RMS_GAIN = 5;             // voice RMS is small; lift it toward 0..1 (tune knob)
    const AUDIO_SMOOTHING = 0.8;    // 0 = instant & jittery, ->1 = heavy lag (tune knob)
    const PITCH_SMOOTHING = 0.6;    // lighter than AUDIO_SMOOTHING — pitch changes faster than loudness (tune knob)
    const PITCH_MIN_RMS = 0.01;     // below this, autocorrelation on near-silence is unstable noise, not pitch

    let audioLevel = 0;   // smoothed RMS loudness, 0..1
    let pitch = -1;        // smoothed fundamental frequency in Hz; -1 = no pitch detected (silence/unvoiced)
    let analyser = null;  // set once the mic is granted
    let audioCtx = null;  // set once the mic is granted; sampleRate needed to convert autocorrelation lag -> Hz
    let timeData = null;
    let floatTimeData = null;
    let startMs = null;   // rAF timestamp at t=0; reset by restart()
    let lastMs = null;    // rAF timestamp of the previous tick

    function initAudio() {
      if (!navigator.mediaDevices || !navigator.mediaDevices.getUserMedia) {
        console.error("mic: getUserMedia unavailable — needs a secure context (https or localhost).");
        return;
      }
      audioCtx = new (window.AudioContext || window.webkitAudioContext)();

      const tryResume = (why) => {
        if (audioCtx.state === "suspended") {
          audioCtx.resume().then(() => console.log(`mic: context resumed (${why}) -> ${audioCtx.state}`));
        }
      };
      // Browsers won't start audio without a user gesture; resume on the first one.
      const resumeOnGesture = () => {
        tryResume("user gesture");
        window.removeEventListener("pointerdown", resumeOnGesture);
        window.removeEventListener("keydown", resumeOnGesture);
      };
      window.addEventListener("pointerdown", resumeOnGesture);
      window.addEventListener("keydown", resumeOnGesture);

      navigator.mediaDevices.getUserMedia({ audio: true }).then((stream) => {
        const source = audioCtx.createMediaStreamSource(stream);
        analyser = audioCtx.createAnalyser();
        analyser.fftSize = 1024;
        source.connect(analyser);
        timeData = new Uint8Array(analyser.fftSize);
        floatTimeData = new Float32Array(analyser.fftSize);
        tryResume("mic granted");
        console.log(`mic: ready, context '${audioCtx.state}'. If that reads 'suspended', click the page once.`);
      }).catch((err) => {
        console.error("mic: microphone unavailable —", err.message);
      });
    }

    // RMS -> gain -> exponential moving average. No-op until the mic is ready.
    function updateAudioLevel() {
      if (!analyser) return;
      analyser.getByteTimeDomainData(timeData); // 0..255 per sample, 128 = silence
      let sumSq = 0;
      for (let i = 0; i < timeData.length; i++) {
        const v = (timeData[i] - 128) / 128;    // -1..1
        sumSq += v * v;
      }
      const rms = Math.sqrt(sumSq / timeData.length);
      const target = Math.min(1, rms * RMS_GAIN);
      audioLevel = audioLevel * AUDIO_SMOOTHING + target * (1 - AUDIO_SMOOTHING);
    }

    // Autocorrelation-based pitch detection (time-domain, not FFT-bin-picking —
    // an FFT bin at fftSize 1024 is ~43Hz wide, too coarse to resolve a voice's
    // fundamental). Returns Hz, or -1 if the signal is too quiet to be reliable.
    // Standard ACF pitch tracker (same shape as the widely-used public-domain
    // examples): trim leading/trailing near-silence, autocorrelate, find the
    // first peak after the initial downslope, then parabolic-interpolate
    // around it for sub-sample precision.
    function autoCorrelate(buf, sampleRate) {
      const SIZE = buf.length;
      let sumSq = 0;
      for (let i = 0; i < SIZE; i++) sumSq += buf[i] * buf[i];
      if (Math.sqrt(sumSq / SIZE) < PITCH_MIN_RMS) return -1;

      let start = 0, end = SIZE - 1;
      const thres = 0.2;
      for (let i = 0; i < SIZE / 2; i++) { if (Math.abs(buf[i]) < thres) { start = i; break; } }
      for (let i = 1; i < SIZE / 2; i++) { if (Math.abs(buf[SIZE - i]) < thres) { end = SIZE - i; break; } }
      const trimmed = buf.slice(start, end);
      const n = trimmed.length;

      const c = new Float32Array(n);
      for (let lag = 0; lag < n; lag++) {
        let sum = 0;
        for (let i = 0; i < n - lag; i++) sum += trimmed[i] * trimmed[i + lag];
        c[lag] = sum;
      }

      let d = 0;
      while (d + 1 < n && c[d] > c[d + 1]) d++;
      let maxVal = -1, maxPos = -1;
      for (let i = d; i < n; i++) {
        if (c[i] > maxVal) { maxVal = c[i]; maxPos = i; }
      }
      if (maxPos <= 0 || maxPos >= n - 1) return -1;

      const x1 = c[maxPos - 1], x2 = c[maxPos], x3 = c[maxPos + 1];
      const a = (x1 + x3 - 2 * x2) / 2;
      const b = (x3 - x1) / 2;
      const t0 = a ? maxPos - b / (2 * a) : maxPos;

      return t0 > 0 ? sampleRate / t0 : -1;
    }

    // No smoothing across a silence gap — a stale pitch bleeding into the next
    // phrase would be worse than a hard reset to -1.
    function updatePitch() {
      if (!analyser) return;
      analyser.getFloatTimeDomainData(floatTimeData);
      const detected = autoCorrelate(floatTimeData, audioCtx.sampleRate);
      if (detected > 0) {
        pitch = pitch > 0 ? pitch * PITCH_SMOOTHING + detected * (1 - PITCH_SMOOTHING) : detected;
      } else {
        pitch = -1;
      }
    }

    // The single master clock: computes t/dt, refreshes audioLevel/pitch, mutates
    // TIME/MIC IN PLACE (no ctx object built or passed anywhere — PHASE2 plan
    // section B), invokes every registered continuous bracket (inside the
    // ambient reconciliation context from section D), advances every
    // registered dynamic (frp.js's tickDynamicProps), and posts each world's
    // full current {id, kind, props} state down as
    // {type:"applyOps", t, ops, removed}.
    function tick(nowMs) {
      requestAnimationFrame(tick);
      if (startMs === null) startMs = nowMs;
      if (lastMs === null) lastMs = nowMs;

      updateAudioLevel();
      updatePitch();
      TIME.t = (nowMs - startMs) / 1000;
      TIME.dt = (nowMs - lastMs) / 1000;
      MIC.audio_level = audioLevel;
      MIC.pitch = pitch;
      lastMs = nowMs;

      for (const [bracketId, fn] of continuousBrackets) {
        pushReconcileCtx(bracketId);
        try {
          fn();
        } catch (e) {
          console.error(`continuous bracket execution error:`, e);
        } finally {
          popReconcileCtx();
        }
      }

      tickDynamicProps(); // advance every registered dynamic across both worlds' state stores

      for (const world of WORLD_NAMES) {
        const ops = [];
        for (const [id, entry] of stateStores[world]) {
          ops.push({ id, kind: entry.kind, props: entry.props });
        }
        const removed = removedSinceTick[world];
        removedSinceTick[world] = [];

        const frame = TARGET_FRAMES[world];
        if (frame && frame.contentWindow) {
          frame.contentWindow.postMessage({ type: "applyOps", t: TIME.t, ops, removed }, "*");
        }
      }
    }
    requestAnimationFrame(tick);

    initAudio();

    // ---- Word tracking --------------------------------------------------
    // "Words" are the spoken words of the plain text PLUS each bracketed
    // [ ... ] command, treated as a single word. They're merged in reading
    // order. We track a "current word" and highlight it; Left/Right move
    // between words, and landing on a command executes it.
    const counterEl = document.getElementById("word-counter");
    let words = [];        // [{ from, to, cmd }] character offsets into the text
    // -1 means "before the first word": nothing is landed on yet, so the first
    // forward step lands on word 0 and executes it if it's a command. Without
    // this sentinel, starting at 0 meant the very first token was stepped over
    // and never ran — so leading `[!let ...]` definitions were silently skipped.
    let wordIndex = -1;
    let currentMark = null;

    function computeWords() {
      const text = editor.getValue();
      const cmdRe = /\[(?:[^\[\]]|\[[^\[\]]*\])*\]/g;

      const tokens = [];
      let m;

      // Each full bracketed command counts as one word.
      while ((m = cmdRe.exec(text)) !== null) {
        tokens.push({ from: m.index, to: m.index + m[0].length, cmd: true });
      }

      // Spoken words: tokenize with commands blanked out (keeping length) so
      // offsets stay accurate and no command text leaks in as a word.
      const plain = text.replace(cmdRe, (cmd) => " ".repeat(cmd.length));
      const wordRe = /[A-Za-z0-9']+/g;
      while ((m = wordRe.exec(plain)) !== null) {
        tokens.push({ from: m.index, to: m.index + m[0].length, cmd: false });
      }

      // Merge into reading order.
      tokens.sort((a, b) => a.from - b.from);
      words = tokens;
      if (wordIndex > words.length - 1) wordIndex = Math.max(-1, words.length - 1);
    }

    function refreshMark(scroll) {
      if (currentMark) { currentMark.clear(); currentMark = null; }

      if (!words.length) {
        counterEl.textContent = "no words";
        return;
      }

      if (wordIndex < 0) {
        counterEl.textContent = `start / ${words.length} words`;
        return;
      }

      const w = words[wordIndex];
      const from = editor.posFromIndex(w.from);
      const to = editor.posFromIndex(w.to);
      currentMark = editor.markText(from, to, { className: "cm-current-word" });
      if (scroll) editor.scrollIntoView({ from, to }, 80);

      counterEl.textContent = `word ${wordIndex + 1} / ${words.length}`;
    }

    function moveWord(delta) {
      if (!words.length) return;
      wordIndex = Math.max(-1, Math.min(wordIndex + delta, words.length - 1));
      refreshMark(true);
      // Landing on a bracketed command executes it (like the original listener).
      const w = words[wordIndex];
      if (w && w.cmd) executeCommandToken(w);
    }

    // Start over: jump back to the first word, reset the clock so t starts at
    // 0 again, wipe the editor's own per-world state stores/namespaces (so ids
    // and `let`-bound handles don't leak across a restart), and reload the
    // interpreter iframes so their native objects are wiped clean too. We
    // don't execute on landing here.
    function restart() {
      wordIndex = -1;
      refreshMark(true);
      startMs = null;
      lastMs = null;
      resetWorldState();
      continuousBrackets.clear();   // no lingering per-tick invocations after a restart
      reconcileRegistry.clear();
      bracketMeta.clear();
      approachRegistry.clear();
      scriptScope = buildScriptScope(); // fresh scope: wipes user `let`-bindings, keeps worldApis/TIME/MIC/SCRIPT wiring
      frames.forEach((f) => { f.contentWindow.location.reload(); });
    }

    // Left/Right always drive the current word (no modifier keys, so modified
    // arrow combos still work for normal editing). Capture phase so CodeMirror
    // doesn't consume them first.
    document.addEventListener("keydown", (e) => {
      if (!e.ctrlKey) return;
      if (e.key === "ArrowLeft") { moveWord(-1); e.preventDefault(); e.stopPropagation(); }
      else if (e.key === "ArrowRight") { moveWord(1); e.preventDefault(); e.stopPropagation(); }
      else if (e.key === "ArrowUp") { restart(); e.preventDefault(); e.stopPropagation(); }
    }, true);

    // Keep the word list in sync with edits and hot reloads (never executes).
    editor.on("changes", () => { computeWords(); refreshMark(false); });

    // Apply new script contents without a full page refresh. Preserve the
    // cursor position and scroll so an on-disk change doesn't yank the view.
    function applyScript(data) {
      document.getElementById("script-path").textContent = data.path;
      document.title = data.path.split("/").pop() + " — Script Editor";

      if (editor.getValue() === data.content) return; // no change, don't disturb

      const cursor = editor.getCursor();
      const scroll = editor.getScrollInfo();
      editor.setValue(data.content);
      editor.setCursor(cursor);
      editor.scrollTo(scroll.left, scroll.top);
    }

    // Server-Sent Events: the server pushes the file contents on connect and
    // again every time the file changes on disk (hot reload).
    function connect() {
      const source = new EventSource("/events");
      source.onmessage = (event) => applyScript(JSON.parse(event.data));
      source.onerror = () => {
        // EventSource auto-reconnects; nothing to do but let it retry.
      };
    }

    connect();
  </script>
</body>
